backend:
  name: git-gateway
  branch: main

media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Author, name: author, widget: string, default: "Jen Vega" }
      - { label: Published On, name: publishedOn, widget: string }
      - label: Category
        name: category
        widget: select
        required: false
        default: ""
        options:
          - { label: "(None)", value: "" }
          - { label: "#MomLife", value: "momlife" }
          - { label: "Health & Wellness", value: "health-wellness" }
          - { label: "Recipes & Meal Planning", value: "meal-planning-recipes" }
          - { label: "Celebrate!", value: "celebrate" }
          - { label: "Travel", value: "travel" }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Body, name: body, widget: markdown }
